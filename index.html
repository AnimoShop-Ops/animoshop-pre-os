<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AnimoShop — Atualização de Preços</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<script src="https://alcdn.msauth.net/browser/2.38.3/js/msal-browser.min.js"></script>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600;700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #f0f2f5; --surface: #ffffff; --surface2: #f7f8fa; --border: #e2e5eb;
    --text: #1a1d23; --accent: #2563eb; --accent-hover: #1d4ed8;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'DM Sans', sans-serif; background: var(--bg); color: var(--text); line-height: 1.5; }
  .btn { padding: 0.6rem 1.2rem; border-radius: 8px; font-weight: 600; cursor: pointer; border: none; transition: 0.2s; }
  .btn-primary { background: var(--accent); color: white; }
  .btn-primary:hover { background: var(--accent-hover); }
  .card { background: var(--surface); border-radius: 12px; border: 1px solid var(--border); padding: 1.5rem; }
</style>
</head>
<body>

<div id="login-screen" style="display: flex; height: 100vh; align-items: center; justify-content: center; flex-direction: column; gap: 20px;">
  <h1 style="font-weight: 800; font-size: 2rem;">ANIMO<span style="color: var(--accent)">SHOP</span></h1>
  <button id="btn-login" class="btn btn-primary" style="font-size: 1.1rem; padding: 1rem 2rem;">Entrar com conta Microsoft</button>
</div>

<div id="app-screen" style="display: none; padding: 2rem;">
    <div class="card">
        <h2 id="user-welcome">Bem-vindo</h2>
        <div style="margin-top: 1rem; display: flex; gap: 10px;">
            <button id="btn-reload" class="btn btn-primary">🔄 Recarregar Luneta</button>
            <input type="file" id="file-input" style="display: none;" accept=".xlsx">
            <button onclick="document.getElementById('file-input').click()" class="btn" style="background: #64748b; color: white;">📂 Subir Planilha SKU</button>
        </div>
        <div id="status-msg" style="margin-top: 10px; font-size: 0.9rem; font-weight: bold;"></div>
    </div>
    
    <div class="card" style="margin-top: 2rem; overflow-x: auto;">
        <table style="width: 100%; border-collapse: collapse; font-size: 0.85rem;">
            <thead>
                <tr style="text-align: left; border-bottom: 2px solid var(--border);">
                    <th style="padding: 10px;">REF</th>
                    <th style="padding: 10px;">NOME</th>
                    <th style="padding: 10px;">AMAZON</th>
                    <th style="padding: 10px;">MELI</th>
                    <th style="padding: 10px;">MAGALU</th>
                </tr>
            </thead>
            <tbody id="table-body"></tbody>
        </table>
    </div>
</div>

<script>
// ════════════ CONFIGURACIÓN REAL ════════════
const CONFIG = {
  clientId: 'c4eeb5ec-4712-4ff8-98c2-0f757f4ae36b',
  tenantId: '7b2cb2b3-ea50-4b32-affa-d67d213f489f',
  lunetaItemId: '01L7ZYY3F22MBAXJTHBRALJGMZMUYPMH3J',
  siteId: 'animoshop.sharepoint.com,03b424c2-97d4-4cb3-932c-7b8517f7bc72,1522e005-078c-471a-935d-87a80f4dba82'
};

const msalConfig = {
  auth: {
    clientId: CONFIG.clientId,
    authority: `https://login.microsoftonline.com/${CONFIG.tenantId}`,
    redirectUri: window.location.origin + window.location.pathname
  }
};

let msalInstance;
let account = null;

async function init() {
  msalInstance = new msal.PublicClientApplication(msalConfig);
  const response = await msalInstance.handleRedirectPromise();
  if (response) account = response.account;
  else {
    const currentAccounts = msalInstance.getAllAccounts();
    if (currentAccounts.length > 0) account = currentAccounts[0];
  }
  if (account) showApp();
}

function showApp() {
  document.getElementById('login-screen').style.display = 'none';
  document.getElementById('app-screen').style.display = 'block';
  document.getElementById('user-welcome').textContent = `Olá, ${account.username}`;
}

document.getElementById('btn-login').onclick = () => {
  msalInstance.loginPopup({ scopes: ["Files.Read.All", "Sites.Read.All"] })
    .then(res => { account = res.account; showApp(); })
    .catch(err => alert("Erro no login: " + err));
};

document.getElementById('btn-reload').onclick = async () => {
    const msg = document.getElementById('status-msg');
    msg.textContent = "⏳ Conectando ao SharePoint...";
    try {
        const tokenRequest = { scopes: ["Files.Read.All"], account: account };
        const tokenResponse = await msalInstance.acquireTokenSilent(tokenRequest);
        
        const response = await fetch(`https://graph.microsoft.com/v1.0/sites/${CONFIG.siteId}/drive/items/${CONFIG.lunetaItemId}/content`, {
            headers: { 'Authorization': `Bearer ${tokenResponse.accessToken}` }
        });
        
        const blob = await response.blob();
        const reader = new FileReader();
        reader.onload = (e) => {
            const wb = XLSX.read(e.target.result, {type: 'binary'});
            const data = XLSX.utils.sheet_to_json(wb.Sheets["Luneta"], {range: 6});
            renderTable(data);
            msg.textContent = `✅ Luneta carregada: ${data.length} itens`;
        };
        reader.readAsBinaryString(blob);
    } catch (err) {
        msg.textContent = "❌ Erro ao carregar arquivo";
        console.error(err);
    }
};

function renderTable(data) {
    const tbody = document.getElementById('table-body');
    tbody.innerHTML = data.map(row => `
        <tr style="border-bottom: 1px solid var(--border);">
            <td style="padding: 10px;">${row.REF || '-'}</td>
            <td style="padding: 10px; font-size: 0.7rem;">${row.NOME || '-'}</td>
            <td style="padding: 10px; color: blue; font-weight: bold;">${row["PREÇO DE VENDA AMAZON"] || '-'}</td>
            <td style="padding: 10px; color: blue; font-weight: bold;">${row["PREÇO DE VENDA MELI"] || '-'}</td>
            <td style="padding: 10px; color: blue; font-weight: bold;">${row["PREÇO DE VENDA MAGALU"] || '-'}</td>
        </tr>
    `).join('');
}

init();
</script>
</body>
</html>
